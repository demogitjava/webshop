<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:insert="fragments.html :: headerfiles">
</head>
<body>
	<header th:insert="fragments.html :: nav"></header>


	<script text="text/javascript">

		var language = window.navigator.language;

		switch (language) {
			case 'en':
				window.location.href = '/en/';
				break;

			case 'it':
				window.location.href = '/it/';
				break;

			case 'fr':
				window.location.href = '/fr/';
				break;

			case 'tr':
				window.location.href = '/tr/';
				break;

			case 'es':
				window.location.href = '/es/';
				break;



			case 'de':

				break;


			default:
				window.location.href = '/en/index.html';
		}

	</script>
	<div class="container">
		<h1 class="display-5">Product Overview</h1>

		<div class="d-flex justify-content-start p-2">
			<a class="list-group-item mr-2" href="#" th:href="@{/allProduct}">All
				Product</a> 
			<a class="list-group-item mr-2"	th:each="category : ${categoryList}"
				th:text="${category.categoryName}" href="#" th:href="@{'/getProducts/' + ${category.categoryId}}"></a>
		</div>

		<div class="row">
			<div class="col-sm-12" th:each="product : ${productList}">
				<div class="card mt-12">
				<img th:src="${product.image}" class="card-img-top" alt="Product Image">
					<div class="card-body">
						<h5 th:text="${product.productName}" class="card-title"></h5>
						<p th:text="${product.productDescription}" class="card-text"></p>
						<p th:text="'$ '+${product.productPrice}" class="card-text"></p>
						<a href="#" th:href="@{'~/profile/addToCart/' + ${product.productId}}" class="btn btn-primary">AddToCart</a>
					</div>
				</div>
			</div>
		</div>

	</div>
</body>
</html>
