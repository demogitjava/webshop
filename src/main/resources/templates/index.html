<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${lang}"
	xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:insert="fragments.html :: headerfiles">

	<style>
		.footer {
			position: fixed;
			left: 0;
			bottom: 0;
			width: 100%;

			text-align: center;
		}
	</style>
</head>
	<body>


	<header th:insert="fragments.html :: nav">

	</header>




	<div class="container-fluid">
		<h1 class="display-5">Product Overview</h1>

		<div class="d-flex justify-content-start p-2">
			<a class="list-group-item mr-2" href="#" th:href="@{/allProduct}">All
				Product</a> 
			<a class="list-group-item mr-2"	th:each="category : ${categoryList}"
				th:text="${category.categoryName}" href="#" th:href="@{'/getProducts/' + ${category.categoryId}}"></a>
		</div>


			<div  th:each="product : ${productList}">
				<div class="row col-lg-12">
					<div class="span12">
						<div class="row-fluid">
							<div class="col-xs-3">
								<img th:src="${product.image}" class="card-img-top" alt="Product Image">
							</div>
							<div class="col-xs-9">
								<div class="card-body">
									<h5 th:text="${product.productName}" class="card-title"></h5>
									<p th:text="${product.productDescription}" class="card-text"></p>
									<p th:text="'$ '+${product.productPrice}" class="card-text"></p>
									<a href="#" th:href="@{'~/profile/addToCart/' + ${product.productId}}" class="btn btn-primary">AddToCart</a>
								</div>
							</div>
						</div>
					</div>
				</div>
			</div>



	</div>

	<div class="footer">
		<footer th:include="footer.html :: footer"></footer>
	</div>



	</body>
<script th:src="@{~/jquery.min.js}"></script>
<script th:src="@{~/bootstrap4/js/bootstrap.js}"></script>
<script th:src="@{~/bootstrap4/js/bootstrap.min.js}"></script>
<script th:src="@{~/bootstrap4/js/bootstrap.bundle.min.js}"></script>
</html>
